components:
  schemas:
    Announcement:
      properties:
        text:
          description: The announcement text
          example: New feature available!
          type: string
        learnMoreUrl:
          description: URL to learn more about the announcement
          example: https://example.com/learn-more
          type: string
      required:
      - text
      type: object
    PosthogConfig:
      properties:
        apiKey:
          description: PostHog API key
          example: phc_abc123
          type: string
        host:
          description: PostHog host URL
          example: https://app.posthog.com
          type: string
      required:
      - apiKey
      - host
      type: object
    OidcConfig:
      properties:
        issuer:
          description: OIDC issuer
          example: https://auth.example.com
          type: string
        clientId:
          description: OIDC client ID
          example: boxlite-client
          type: string
        audience:
          description: OIDC audience
          example: boxlite-api
          type: string
        endSessionEndpoint:
          description: OIDC end-session endpoint. Set when the IdP does not advertise
            one via discovery (e.g. Dex) and BoxLite hosts a compatible logout endpoint.
          example: https://api.example.com/api/auth/end-session
          type: string
      required:
      - audience
      - clientId
      - issuer
      type: object
    RateLimitEntry:
      properties:
        ttl:
          description: Rate limit TTL in seconds
          example: 60
          type: number
        limit:
          description: Rate limit max requests
          example: 100
          type: number
      type: object
    RateLimitConfig:
      properties:
        failedAuth:
          allOf:
          - $ref: "#/components/schemas/RateLimitEntry"
          description: Failed authentication rate limit
        authenticated:
          allOf:
