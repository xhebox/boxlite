[package]
name = "libkrun-sys"
version.workspace = true
edition = "2021"
authors.workspace = true
license.workspace = true
description = "BoxLite facade for libkrun and libkrunfw runtime artifacts"
repository = "https://github.com/boxlite-ai/boxlite"

links = "krun"
exclude = ["vendor"]

[build-dependencies]
pkg-config = "0.3"
num_cpus = "1.16"

[dependencies]
libc = "0.2"
krun = { package = "libkrun", path = "vendor/libkrun/src/libkrun", optional = true, default-features = false, features = ["net", "blk"] }

[features]
default = []
krun = ["dep:krun"] # Compile the vendored libkrun runtime
krunfw = [] # Package libkrunfw artifacts
krunfw-source = ["krunfw"] # Package source-built raw kernel and shared library; static musl packages only the raw kernel
